<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whylovly - Главная</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            background: #333;
            padding: 15px;
            position: sticky;
            top: 0;
            width: 100%;
            font-size: 18px;
        }
        .menu a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }
        h1 {
            font-size: 32px;
            text-align: center;
        }
        .post {
            background: #1e1e1e;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .post img {
            width: 100%;
            border-radius: 10px;
        }
        .post p {
            font-size: 16px;
            color: #ccc;
            margin: 0;
        }
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
        }
        .actions span {
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="menu">
        <a href="#">Главная</a>
        <a href="#music">Музыка</a>
        <a href="#video">Видео</a>
    </div>
    
    <div class="container">
        <h1>whylovly</h1>
        
        <div class="post">
            <img src="your-image-url1.jpg" alt="Пост whylovly">
            <p>Описание поста...</p>
            <div class="actions">
                <span>❤️ 0</span>
                <span>💬</span>
            </div>
        </div>
        
        <div class="post">
            <img src="your-image-url2.jpg" alt="Пост whylovly">
            <p>Описание второго поста...</p>
            <div class="actions">
                <span>❤️ 0</span>
                <span>💬</span>
            </div>
        </div>
    </div>
</body>
</html>
