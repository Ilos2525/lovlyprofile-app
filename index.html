<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whylovly - Социальная сеть</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
        }
        .menu {
            display: flex;
            justify-content: center;
            background: #1e1e1e;
            padding: 15px;
            position: sticky;
            top: 0;
            width: 100%;
        }
        .menu a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            font-weight: bold;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }
        .post {
            background: #1e1e1e;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        .post img, .post video {
            max-width: 100%;
            border-radius: 10px;
        }
        .like-btn {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="menu">
        <a href="#">Главная</a>
        <a href="#videos">Видео</a>
        <a href="#music">Музыка</a>
    </div>
    
    <div class="container">
        <h1>whylovly</h1>
        <p>Музыка, видео, творчество.</p>
        
        <!-- Видео пост -->
        <div class="post" id="videos">
            <h3>Моё новое видео</h3>
            <video controls>
                <source src="your-video-url.mp4" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
            <p>Описание видео...</p>
            <button class="like-btn">❤ 0</button>
        </div>
        
        <!-- Музыкальный пост -->
        <div class="post" id="music">
            <h3>Моя новая музыка</h3>
            <audio controls>
                <source src="your-music-url.mp3" type="audio/mp3">
                Ваш браузер не поддерживает аудио.
            </audio>
            <p>Описание трека...</p>
            <button class="like-btn">❤ 0</button>
        </div>
    </div>
</body>
</html>
