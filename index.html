<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whylovly - Главная</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            background: #333;
            padding: 15px;
            position: sticky;
            top: 0;
            width: 100%;
            font-size: 20px;
        }
        .menu a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }
        h1 {
            font-size: 36px;
        }
        .post {
            background: #1e1e1e;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            position: relative;
        }
        .post img {
            width: 100%;
            max-height: 300px;
            border-radius: 10px;
        }
        .arrows {
            display: flex;
            justify-content: space-between;
            position: absolute;
            top: 50%;
            width: 100%;
        }
        .arrows span {
            cursor: pointer;
            font-size: 24px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 50%;
        }
        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="menu">
        <a href="#">Главная</a>
        <a href="#music">Музыка</a>
        <a href="#video">Видео</a>
    </div>
    
    <div class="container">
        <h1>whylovly</h1>
        
        <div class="post">
            <div class="arrows">
                <span onclick="prevImage()">◀</span>
                <span onclick="nextImage()">▶</span>
            </div>
            <img id="postImage" src="your-image-url.jpg" alt="Пост whylovly">
            <p>Описание поста...</p>
            <div class="actions">
                <span>❤️</span>
                <span>💬</span>
            </div>
        </div>
    </div>
    
    <script>
        let images = ["your-image-url1.jpg", "your-image-url2.jpg"];
        let currentIndex = 0;
        
        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            document.getElementById("postImage").src = images[currentIndex];
        }
        
        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            document.getElementById("postImage").src = images[currentIndex];
        }
    </script>
</body>
</html>
